      - palestinian people
      - palestinians
      - population of gaza
      - civilians in gaza
      - protected persons
      - civilian population
    unilateral_measures:
      label: Unilateral measures
      description: 'Strategic framing of unilateral sanctions, countermeasures, and
        their legality, proportionality, and humanitarian effects.

        '
      members:
      - unilateral measure
      - unilateral measures
      - sanctions
      - countermeasures
      - restrictive measures
      - economic sanctions
    humanitarian_access:
