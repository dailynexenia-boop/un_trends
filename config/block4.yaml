block4_2:
  argument_sets:
    unilateral_measures:
      description: 'Legal and normative arguments commonly mobilised in relation to
        unilateral coercive measures (UCM).

        '
      arguments:
        illegality_under_international_law:
          label: Illegality under international law
          category: legal
        violation_of_un_charter:
          label: Violation of the UN Charter
          category: legal
        violation_of_sovereignty:
          label: Violation of state sovereignty
          category: legal
        humanitarian_impact:
          label: Humanitarian impact on civilian populations
          category: human_rights
        collective_punishment:
          label: Collective punishment
          category: humanitarian_law
        extraterritorial_application:
          label: Unlawful extraterritorial application of domestic law
          category: legal
        discrimination_and_selectivity:
          label: Discriminatory or selective application of measures
          category: political
    palestine:
      description: 'Core argumentative frames mobilised in relation to Palestine /
        Occupied Palestinian Territory.

        '
      arguments:
        right_to_self_determination:
          label: Right to self-determination
          category: international_law
        occupation_and_annexation:
          label: Occupation, annexation, and territorial integrity
          category: international_law
        collective_punishment:
          label: Collective punishment of civilian population
          category: humanitarian_law
        genocide_and_atrocity_crimes:
          label: Genocide or other atrocity crimes
          category: international_criminal_law
        humanitarian_access:
          label: Humanitarian access and protection of civilians
          category: humanitarian_law
        accountability_and_impunity:
          label: Accountability, impunity, and international justice
          category: international_criminal_law
  resonance_thresholds:
    high_resonance:
      min_hits: 30
    emerging:
      min_hits: 8
      max_hits: 29
    marginal:
      exact_hits: 1
  projection_policy:
    instruction: 'You analyze UN Human Rights Council statements. For the text below,
      return ONLY a JSON list of argument keys chosen strictly from the provided list.

      '
